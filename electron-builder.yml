appId: com.doccapturetool.app
productName: Documentation Capture Tool
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!.superpowers/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: doc-capture-tool
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  # v1 ships unsigned (no Apple Developer Program enrollment for this pass).
  # identity: null forces an unsigned build even if a local Developer ID
  # certificate happens to be present on the build machine - see Task 12 brief.
  identity: null
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
